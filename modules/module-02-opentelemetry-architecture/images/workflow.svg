<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675"><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#0f172a"/></marker><style>.t{font:700 44px Arial;fill:#06164f}.s{font:400 22px Arial;fill:#475569}.c{fill:#fff;stroke:#bfdbfe;stroke-width:3}.h{font:700 24px Arial;fill:#0b4bd8}.b{font:500 18px Arial;fill:#334155}.arr{stroke:#0f172a;stroke-width:5;marker-end:url(#a)}</style></defs><rect width="1200" height="675" fill="#f8fbff"/><text x="70" y="80" class="t">OpenTelemetry Telemetry Flow</text><text x="70" y="118" class="s">From instrumented code to backend analysis through OTLP and the Collector</text><g transform="translate(85 285)"><rect width="190" height="120" rx="18" class="c"/><text x="95" y="55" text-anchor="middle" class="h">Application</text><text x="95" y="86" text-anchor="middle" class="b">API + SDK</text></g><line x1="275" y1="345" x2="390" y2="345" class="arr"/><g transform="translate(390 285)"><rect width="190" height="120" rx="18" class="c"/><text x="95" y="55" text-anchor="middle" class="h">OTLP</text><text x="95" y="86" text-anchor="middle" class="b">logs metrics traces</text></g><line x1="580" y1="345" x2="695" y2="345" class="arr"/><g transform="translate(695 255)"><rect width="220" height="180" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="110" y="80" text-anchor="middle" class="h">Collector</text><text x="110" y="112" text-anchor="middle" class="b">receive process export</text></g><line x1="915" y1="345" x2="1030" y2="345" class="arr"/><g transform="translate(1030 285)"><rect width="130" height="120" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="3"/><text x="65" y="55" text-anchor="middle" class="h" fill="#92400e">Backend</text><text x="65" y="86" text-anchor="middle" class="b">query</text></g></svg>