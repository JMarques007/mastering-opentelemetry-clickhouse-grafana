<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675"><style>.t{font:700 44px Arial;fill:#06164f}.s{font:400 22px Arial;fill:#475569}.h{font:700 24px Arial;fill:#ea580c}.b{font:500 18px Arial;fill:#334155}.c{fill:#fff;stroke:#fed7aa;stroke-width:3}.m{font:500 15px Consolas;fill:#0f172a}</style><rect width="1200" height="675" fill="#f8fbff"/><text x="70" y="80" class="t">Grafana Operations View</text><text x="70" y="118" class="s">Keeping dashboards useful, fast and trusted by operators</text><rect x="80" y="205" width="310" height="300" rx="18" class="c"/><text x="235" y="250" text-anchor="middle" class="h">Symptom</text><text x="235" y="315" text-anchor="middle" class="b">Slow panels</text><text x="235" y="350" text-anchor="middle" class="b">Confusing dashboards</text><rect x="445" y="205" width="310" height="300" rx="18" class="c"/><text x="600" y="250" text-anchor="middle" class="h">Evidence</text><text x="490" y="315" class="m">query time high</text><text x="490" y="350" class="m">too many panels</text><text x="490" y="385" class="m">mixed units</text><rect x="810" y="205" width="310" height="300" rx="18" class="c"/><text x="965" y="250" text-anchor="middle" class="h">Action</text><text x="965" y="315" text-anchor="middle" class="b">Simplify layout</text><text x="965" y="350" text-anchor="middle" class="b">Tune queries</text><text x="965" y="385" text-anchor="middle" class="b">Use consistent units</text></svg>