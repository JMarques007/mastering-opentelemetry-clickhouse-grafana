<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Logs, metrics and traces</title>
  <desc id="desc">Comparison of the three main observability signals: logs, metrics and traces.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>
      .title{font:700 54px Arial,sans-serif;fill:#06164f}.subtitle{font:400 20px Arial,sans-serif;fill:#475569}.card{fill:#fff;stroke-width:2;filter:url(#shadow)}.h{font:700 24px Arial,sans-serif}.body{font:500 15px Arial,sans-serif;fill:#0f172a}.small{font:500 12px Arial,sans-serif;fill:#334155}.mono{font:500 12px Consolas,monospace;fill:#172554}.pill{font:700 11px Arial,sans-serif}.best{font:700 15px Arial,sans-serif}.axis{stroke:#cbd5e1;stroke-width:1}.line{fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f8fbff"/>
  <text x="600" y="70" text-anchor="middle" class="title">Logs, Metrics and Traces</text>
  <text x="600" y="105" text-anchor="middle" class="subtitle">Three pillars of observability. Different views. Unified insights.</text>

  <g transform="translate(28 128)">
    <rect width="360" height="438" rx="16" class="card" stroke="#2563eb"/>
    <circle cx="52" cy="34" r="34" fill="#0b63e5"/><path d="M39 16h20l14 14v28H39z" fill="none" stroke="#fff" stroke-width="4"/><path d="M59 17v14h14M47 40h18M47 50h18" stroke="#fff" stroke-width="4"/>
    <text x="104" y="40" class="h" fill="#0b63e5">LOGS</text><text x="104" y="65" class="body">Event records</text>
    <rect x="26" y="90" width="308" height="45" rx="10" fill="#eff6ff"/><text x="74" y="118" class="body">Discrete events that explain what happened.</text><circle cx="50" cy="113" r="12" fill="#0b63e5"/><text x="50" y="118" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#fff">i</text>
    <text x="26" y="165" class="best" fill="#0b63e5">Example log events</text>
    <rect x="26" y="176" width="308" height="220" rx="8" fill="#fff" stroke="#dbeafe"/>
    <text x="40" y="202" class="small" font-weight="700">TIME</text><text x="132" y="202" class="small" font-weight="700">LEVEL</text><text x="194" y="202" class="small" font-weight="700">SERVICE</text><text x="270" y="202" class="small" font-weight="700">MESSAGE</text>
    <line x1="26" y1="214" x2="334" y2="214" stroke="#e2e8f0"/>
    <g class="mono"><text x="40" y="239">10:15:21</text><text x="132" y="239" fill="#0b63e5">INFO</text><text x="194" y="239">api</text><text x="270" y="239">received</text><text x="40" y="276">10:15:22</text><text x="132" y="276" fill="#16a34a">INFO</text><text x="194" y="276">auth</text><text x="270" y="276">user ok</text><text x="40" y="313">10:15:23</text><text x="132" y="313" fill="#d97706">WARN</text><text x="194" y="313">stock</text><text x="270" y="313">low item</text><text x="40" y="350">10:15:24</text><text x="132" y="350" fill="#dc2626">ERROR</text><text x="194" y="350">ship</text><text x="270" y="350">timeout</text></g>
    <rect x="26" y="414" width="308" height="54" rx="10" fill="#eff6ff"/><text x="74" y="447" class="body"><tspan font-weight="700" fill="#0b63e5">Best for:</tspan> debugging and auditing.</text><circle cx="50" cy="441" r="14" fill="none" stroke="#0b63e5" stroke-width="4"/><path d="M61 452l13 13" stroke="#0b63e5" stroke-width="4"/>
  </g>

  <g transform="translate(420 128)">
    <rect width="360" height="438" rx="16" class="card" stroke="#16a34a"/>
    <circle cx="52" cy="34" r="34" fill="#168a3a"/><path d="M35 52V18M35 52h40M43 43l12-12 9 8 18-24" fill="none" stroke="#fff" stroke-width="4"/>
    <text x="104" y="40" class="h" fill="#168a3a">METRICS</text><text x="104" y="65" class="body">Time-series measurements</text>
    <rect x="26" y="90" width="308" height="45" rx="10" fill="#ecfdf5"/><text x="74" y="118" class="body">Numeric measurements that show behavior over time.</text><circle cx="50" cy="113" r="12" fill="#168a3a"/><text x="50" y="118" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#fff">i</text>
    <text x="26" y="165" class="best" fill="#168a3a">Example metrics</text>
    <g transform="translate(26 178)">
      <rect width="308" height="66" rx="9" fill="#fff" stroke="#d1fae5"/><text x="12" y="22" class="mono" font-weight="700">http.requests.count</text><polyline points="12,49 35,38 58,44 81,32 104,37 127,31 150,40 173,36 196,42 219,30 242,38 265,33 296,39" class="line" stroke="#0b63e5"/><text x="250" y="35" font-family="Arial" font-size="22" font-weight="700" fill="#0b63e5">1.24k</text>
      <rect y="84" width="308" height="66" rx="9" fill="#fff" stroke="#d1fae5"/><text x="12" y="106" class="mono" font-weight="700">duration p95</text><polyline points="12,134 35,130 58,119 81,132 104,122 127,134 150,116 173,128 196,124 219,132 242,118 265,130 296,121" class="line" stroke="#168a3a"/><text x="255" y="120" font-family="Arial" font-size="22" font-weight="700" fill="#168a3a">842</text>
      <rect y="168" width="308" height="66" rx="9" fill="#fff" stroke="#d1fae5"/><text x="12" y="190" class="mono" font-weight="700">error.rate</text><polyline points="12,218 35,212 58,216 81,198 104,214 127,207 150,202 173,196 196,201 219,209 242,203 265,184 296,196" class="line" stroke="#7c3aed"/><text x="250" y="204" font-family="Arial" font-size="22" font-weight="700" fill="#7c3aed">1.32%</text>
    </g>
    <rect x="26" y="414" width="308" height="54" rx="10" fill="#ecfdf5"/><text x="74" y="447" class="body"><tspan font-weight="700" fill="#168a3a">Best for:</tspan> trends and health.</text><rect x="43" y="430" width="8" height="23" fill="#168a3a"/><rect x="57" y="420" width="8" height="33" fill="#168a3a"/><rect x="71" y="437" width="8" height="16" fill="#168a3a"/>
  </g>

  <g transform="translate(812 128)">
    <rect width="360" height="438" rx="16" class="card" stroke="#7c3aed"/>
    <circle cx="52" cy="34" r="34" fill="#6d35d5"/><circle cx="38" cy="48" r="5" fill="#fff"/><circle cx="52" cy="28" r="5" fill="#fff"/><circle cx="69" cy="42" r="5" fill="#fff"/><path d="M38 48L52 28l17 14" stroke="#fff" stroke-width="4" fill="none"/>
    <text x="104" y="40" class="h" fill="#6d35d5">TRACES</text><text x="104" y="65" class="body">Request journeys</text>
    <rect x="26" y="90" width="308" height="45" rx="10" fill="#f5f3ff"/><text x="74" y="118" class="body">End-to-end path of a request across services.</text><circle cx="50" cy="113" r="12" fill="#6d35d5"/><text x="50" y="118" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#fff">i</text>
    <text x="26" y="165" class="best" fill="#6d35d5">Example trace</text>
    <rect x="26" y="176" width="308" height="220" rx="8" fill="#fff" stroke="#ddd6fe"/>
    <text x="42" y="200" class="small">SERVICE</text><text x="160" y="200" class="small">0ms</text><text x="224" y="200" class="small">640ms</text><text x="298" y="200" class="small">1.28s</text>
    <g class="small"><text x="42" y="232">api-gateway</text><text x="42" y="266">user-service</text><text x="42" y="300">inventory</text><text x="42" y="334">payment</text><text x="42" y="368">shipping</text></g>
    <g stroke="#e2e8f0"><line x1="158" y1="210" x2="158" y2="382"/><line x1="224" y1="210" x2="224" y2="382"/><line x1="298" y1="210" x2="298" y2="382"/></g>
    <g><rect x="158" y="222" width="45" height="12" rx="4" fill="#6d35d5"/><rect x="193" y="256" width="58" height="12" rx="4" fill="#7c3aed"/><rect x="238" y="290" width="52" height="12" rx="4" fill="#8b5cf6"/><rect x="263" y="324" width="68" height="12" rx="4" fill="#be123c"/><rect x="330" y="358" width="18" height="12" rx="4" fill="#6d35d5"/></g>
    <rect x="26" y="414" width="308" height="54" rx="10" fill="#f5f3ff"/><text x="74" y="438" class="body"><tspan font-weight="700" fill="#6d35d5">Best for:</tspan> latency, dependencies,</text><text x="74" y="458" class="body">and pinpointing slow operations.</text><path d="M45 453v-25h22v25m-11-25v-12" fill="none" stroke="#6d35d5" stroke-width="4"/>
  </g>

  <rect x="28" y="592" width="1144" height="54" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="82" y="626" font-family="Arial" font-size="20" font-weight="700" fill="#0b63e5">Stronger together</text>
  <text x="260" y="626" class="body">Logs tell what happened.</text>
  <text x="505" y="626" class="body">Metrics show how it is behaving.</text>
  <text x="795" y="626" class="body">Traces show why it happened.</text>
  <text x="1010" y="626" class="body" font-weight="700">Combined insight.</text>
</svg>
