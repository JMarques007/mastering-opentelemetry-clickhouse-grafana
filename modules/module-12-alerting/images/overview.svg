<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Module 12 - Alerting</title>
  <desc id="desc">Illustration of alert rules turning service signals into routed notifications.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="70" y="70" width="1060" height="535" rx="24" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <text x="110" y="135" font-family="Arial" font-size="42" font-weight="700" fill="#111827">Alerting</text>
  <text x="110" y="185" font-family="Arial" font-size="22" fill="#4b5563">Turning symptoms into actionable response workflows</text>
  <rect x="140" y="310" width="210" height="115" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="245" y="377" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700" fill="#1e3a8a">Signal</text>
  <path d="M350 367 H465" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <polygon points="585,255 705,475 465,475" fill="#fee2e2" stroke="#dc2626" stroke-width="5"/>
  <text x="585" y="400" text-anchor="middle" font-family="Arial" font-size="32" font-weight="700" fill="#991b1b">Rule</text>
  <path d="M705 367 H820" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="820" y="310" width="240" height="115" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="940" y="360" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700" fill="#14532d">Notify</text>
  <text x="940" y="392" text-anchor="middle" font-family="Arial" font-size="17" fill="#166534">route escalate resolve</text>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#111827"/></marker></defs>
</svg>
