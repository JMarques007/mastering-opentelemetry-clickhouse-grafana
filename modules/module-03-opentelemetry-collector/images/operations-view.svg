<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675"><style>.t{font:700 44px Arial;fill:#06164f}.s{font:400 22px Arial;fill:#475569}.h{font:700 24px Arial;fill:#0b4bd8}.b{font:500 18px Arial;fill:#334155}.c{fill:#fff;stroke:#bfdbfe;stroke-width:3}.m{font:500 15px Consolas;fill:#0f172a}</style><rect width="1200" height="675" fill="#f8fbff"/><text x="70" y="80" class="t">Collector Operations View</text><text x="70" y="118" class="s">Operational checks when telemetry is missing, delayed or malformed</text><rect x="80" y="205" width="310" height="300" rx="18" class="c"/><text x="235" y="250" text-anchor="middle" class="h">Symptom</text><text x="235" y="315" text-anchor="middle" class="b">Missing spans</text><text x="235" y="350" text-anchor="middle" class="b">Dropped batches</text><text x="235" y="385" text-anchor="middle" class="b">Exporter retries</text><rect x="445" y="205" width="310" height="300" rx="18" class="c"/><text x="600" y="250" text-anchor="middle" class="h">Evidence</text><text x="490" y="315" class="m">processor=batch</text><text x="490" y="350" class="m">queue_size=full</text><text x="490" y="385" class="m">exporter=retrying</text><rect x="810" y="205" width="310" height="300" rx="18" class="c"/><text x="965" y="250" text-anchor="middle" class="h">Action</text><text x="965" y="315" text-anchor="middle" class="b">Tune queues</text><text x="965" y="350" text-anchor="middle" class="b">Reduce cardinality</text><text x="965" y="385" text-anchor="middle" class="b">Validate endpoints</text></svg>