<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Module 06 - Traces</title>
  <desc id="desc">Illustration of a distributed trace with spans across services.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="70" y="70" width="1060" height="535" rx="24" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <text x="110" y="135" font-family="Arial" font-size="42" font-weight="700" fill="#111827">Traces</text>
  <text x="110" y="185" font-family="Arial" font-size="22" fill="#4b5563">Following one request across service boundaries</text>
  <text x="150" y="270" font-family="Arial" font-size="22" font-weight="700" fill="#374151">gateway</text>
  <rect x="300" y="245" width="650" height="36" rx="8" fill="#2563eb"/>
  <text x="150" y="350" font-family="Arial" font-size="22" font-weight="700" fill="#374151">checkout</text>
  <rect x="390" y="325" width="420" height="36" rx="8" fill="#16a34a"/>
  <text x="150" y="430" font-family="Arial" font-size="22" font-weight="700" fill="#374151">payment</text>
  <rect x="500" y="405" width="260" height="36" rx="8" fill="#d97706"/>
  <text x="150" y="510" font-family="Arial" font-size="22" font-weight="700" fill="#374151">database</text>
  <rect x="690" y="485" width="180" height="36" rx="8" fill="#7c3aed"/>
  <line x1="300" y1="548" x2="950" y2="548" stroke="#6b7280" stroke-width="3"/>
  <text x="300" y="580" text-anchor="middle" font-family="Arial" font-size="18" fill="#6b7280">start</text>
  <text x="950" y="580" text-anchor="middle" font-family="Arial" font-size="18" fill="#6b7280">finish</text>
</svg>
