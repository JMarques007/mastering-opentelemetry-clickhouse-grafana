<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Telemetry correlation</title>
  <desc id="desc">A metric spike is correlated with traces and logs to identify a payment provider timeout root cause.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.16"/></filter>
    <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#0b63e5"/><stop offset="1" stop-color="#005bd8"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#0b4bd8"/></marker>
    <style>
      .title{font:700 52px Arial,sans-serif;fill:#06164f}.card{fill:#fff;stroke:#dbeafe;stroke-width:2;filter:url(#shadow)}.caption{font:700 22px Arial,sans-serif;fill:#fff}.h{font:700 18px Arial,sans-serif;fill:#06164f}.body{font:500 15px Arial,sans-serif;fill:#1e293b}.small{font:500 12px Arial,sans-serif;fill:#334155}.mono{font:500 12px Consolas,monospace;fill:#0f172a}.iconStroke{fill:none;stroke:#0b4bd8;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.flow{stroke:#0b4bd8;stroke-width:4;marker-end:url(#arrow)}.axis{stroke:#cbd5e1;stroke-width:1}.dash{fill:none;stroke:#0b63e5;stroke-width:3;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="675" fill="#fbfdff"/>
  <text x="600" y="74" text-anchor="middle" class="title">Telemetry Correlation</text>
  <line x1="376" y1="105" x2="824" y2="105" stroke="#93c5fd" stroke-width="2"/><circle cx="600" cy="105" r="6" fill="#0b63e5"/>

  <g transform="translate(93 139)">
    <circle cx="58" cy="58" r="58" fill="#eff6ff" stroke="#0b4bd8" stroke-width="3"/><polyline points="28,83 28,34 48,34 48,68 70,48 92,70 111,49" class="iconStroke"/><circle cx="94" cy="33" r="14" fill="#ef4444"/><text x="94" y="41" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#fff">!</text>
  </g>
  <line x1="242" y1="198" x2="356" y2="198" class="flow"/>
  <g transform="translate(386 139)"><circle cx="58" cy="58" r="58" fill="#eff6ff" stroke="#0b4bd8" stroke-width="3"/><circle cx="30" cy="36" r="5" fill="#fff" stroke="#0b4bd8" stroke-width="4"/><circle cx="58" cy="64" r="5" fill="#fff" stroke="#0b4bd8" stroke-width="4"/><circle cx="91" cy="86" r="5" fill="#fff" stroke="#0b4bd8" stroke-width="4"/><path d="M30 36h61M30 64h28M30 86h61M30 36l28 28" class="iconStroke"/></g>
  <line x1="535" y1="198" x2="649" y2="198" class="flow"/>
  <g transform="translate(679 139)"><circle cx="58" cy="58" r="58" fill="#eff6ff" stroke="#0b4bd8" stroke-width="3"/><path d="M38 28h42l14 14v48H38z" fill="none" stroke="#0b4bd8" stroke-width="4"/><path d="M80 28v16h16M50 58h42M50 72h42M50 86h30" class="iconStroke"/></g>
  <line x1="828" y1="198" x2="942" y2="198" class="flow"/>
  <g transform="translate(972 139)"><circle cx="58" cy="58" r="58" fill="#eff6ff" stroke="#0b4bd8" stroke-width="3"/><path d="M32 59c0-31 52-31 52 0 0 13-10 18-14 28H46c-4-10-14-15-14-28zM48 97h20M51 110h14M58 23v-18M26 33l-12-12M90 33l12-12M17 62H2M114 62h-15" class="iconStroke"/></g>

  <g transform="translate(24 258)">
    <rect width="260" height="285" rx="14" class="card"/>
    <text x="130" y="31" text-anchor="middle" class="h">Requests per second</text>
    <line x1="38" y1="205" x2="236" y2="205" class="axis"/><line x1="38" y1="55" x2="38" y2="205" class="axis"/>
    <g stroke="#e2e8f0"><line x1="38" y1="155" x2="236" y2="155"/><line x1="38" y1="105" x2="236" y2="105"/><line x1="38" y1="55" x2="236" y2="55"/></g>
    <text x="16" y="209" class="small">0</text><text x="14" y="159" class="small">5K</text><text x="8" y="109" class="small">10K</text><text x="8" y="59" class="small">15K</text>
    <polyline points="38,177 52,184 66,172 80,181 94,166 108,180 122,179 136,162 150,175 164,171 178,190 192,174 206,168 220,55 230,158 236,174" fill="none" stroke="#0b63e5" stroke-width="3"/>
    <polyline points="206,168 220,55 230,158" fill="none" stroke="#ef4444" stroke-width="4"/><circle cx="220" cy="55" r="5" fill="#ef4444"/>
    <rect y="242" width="260" height="43" rx="9" fill="url(#blue)"/><text x="130" y="271" text-anchor="middle" class="caption">Metric Spike</text>
  </g>

  <g transform="translate(310 258)">
    <rect width="280" height="285" rx="14" class="card"/>
    <text x="18" y="31" class="body">Trace ID: 4f2a7c89e8b1d3f1</text><text x="234" y="31" class="body" fill="#0b63e5" font-weight="700">412 ms</text>
    <g transform="translate(82 61)">
      <g class="small" text-anchor="middle"><text x="0" y="0">0 ms</text><text x="53" y="0">100</text><text x="106" y="0">200</text><text x="159" y="0">300</text><text x="212" y="0">400</text></g>
      <g stroke="#dbeafe" stroke-dasharray="5 5"><line x1="0" y1="10" x2="0" y2="192"/><line x1="53" y1="10" x2="53" y2="192"/><line x1="106" y1="10" x2="106" y2="192"/><line x1="159" y1="10" x2="159" y2="192"/><line x1="212" y1="10" x2="212" y2="192"/></g>
      <g class="small" text-anchor="end"><text x="-12" y="34">API Gateway</text><text x="-12" y="68">Auth Service</text><text x="-12" y="102">User Service</text><text x="-12" y="136">Order Service</text><text x="-12" y="170" font-weight="700">Payment Service</text></g>
      <rect x="0" y="24" width="38" height="10" rx="3" fill="#0b63e5"/><rect x="30" y="58" width="55" height="10" rx="3" fill="#0b63e5"/><rect x="45" y="92" width="70" height="10" rx="3" fill="#0b63e5"/><rect x="100" y="126" width="42" height="10" rx="3" fill="#0b63e5"/><rect x="132" y="160" width="70" height="10" rx="3" fill="#ef4444"/><text x="212" y="170" font-family="Arial" font-size="12" font-weight="700" fill="#ef4444">280 ms</text>
    </g>
    <rect y="242" width="280" height="43" rx="9" fill="url(#blue)"/><text x="140" y="271" text-anchor="middle" class="caption">Trace</text>
  </g>

  <g transform="translate(618 258)">
    <rect width="280" height="285" rx="14" class="card"/>
    <text x="18" y="31" class="small" font-weight="700">Time</text><text x="88" y="31" class="small" font-weight="700">Level</text><text x="138" y="31" class="small" font-weight="700">Message</text><line x1="18" y1="42" x2="262" y2="42" stroke="#cbd5e1"/>
    <g class="mono"><text x="18" y="66">10:20:31.123</text><text x="88" y="66" fill="#0b63e5">INFO</text><text x="138" y="66">Payment request received</text><text x="18" y="98">10:20:31.456</text><text x="88" y="98" fill="#0b63e5">INFO</text><text x="138" y="98">Validating payment</text></g>
    <rect x="14" y="112" width="252" height="32" fill="#fee2e2" opacity=".75"/><text x="18" y="133" class="mono">10:20:31.789</text><text x="88" y="133" class="mono" fill="#f97316">WARN</text><text x="138" y="133" class="mono">Provider timeout</text>
    <g class="mono"><text x="18" y="166">10:20:32.012</text><text x="88" y="166" fill="#dc2626">ERROR</text><text x="138" y="166">Payment failed</text><text x="18" y="198">10:20:32.516</text><text x="88" y="198" fill="#dc2626">ERROR</text><text x="138" y="198">Retry failed</text></g>
    <rect y="242" width="280" height="43" rx="9" fill="url(#blue)"/><text x="140" y="271" text-anchor="middle" class="caption">Logs</text>
  </g>

  <g transform="translate(926 258)">
    <rect width="250" height="285" rx="14" class="card"/>
    <circle cx="125" cy="54" r="22" fill="#ef4444" opacity=".9"/><text x="125" y="64" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#fff">!</text>
    <text x="125" y="102" text-anchor="middle" class="h">Payment provider timeout</text><line x1="26" y1="122" x2="224" y2="122" stroke="#dbeafe"/>
    <g class="body"><path d="M40 152h18m-9-9v18" stroke="#0b63e5" stroke-width="3"/><text x="78" y="150">High latency in Payment</text><text x="78" y="170">Service caused timeouts</text><path d="M40 205c12-18 27-18 39 0" fill="none" stroke="#0b63e5" stroke-width="4"/><text x="78" y="203">Failures cascaded to</text><text x="78" y="223">downstream services</text><path d="M49 249l18 8v18l-18 8-18-8v-18z" fill="none" stroke="#0b63e5" stroke-width="3"/><text x="78" y="257">Error rate and request</text><text x="78" y="277">latency increased</text></g>
    <rect y="242" width="250" height="43" rx="9" fill="url(#blue)"/><text x="125" y="271" text-anchor="middle" class="caption">Root Cause</text>
  </g>

  <path d="M150 558v23q0 18 18 18h868q18 0 18-18v-22" class="dash"/>
  <rect x="438" y="616" width="324" height="40" rx="20" fill="#fff" stroke="#bfdbfe" stroke-width="3"/>
  <path d="M470 636c8-8 24-8 32 0 8-8 24-8 32 0" fill="none" stroke="#0b63e5" stroke-width="4"/><text x="555" y="642" font-family="Arial" font-size="20" font-weight="700" fill="#08256f">Correlate. Investigate. Resolve.</text>
</svg>
