<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Module 01 - Introduction to Observability</title>
  <desc id="desc">Illustration showing telemetry signals flowing into an observability feedback loop.</desc>
  <rect width="1200" height="675" fill="#f7fafc"/>
  <rect x="70" y="70" width="1060" height="535" rx="24" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <text x="110" y="135" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">Introduction to Observability</text>
  <text x="110" y="185" font-family="Arial, sans-serif" font-size="22" fill="#4b5563">From symptoms to signals, insight and action</text>
  <circle cx="280" cy="360" r="86" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="280" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a8a">Signals</text>
  <text x="280" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">logs metrics traces</text>
  <path d="M390 360 H505" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <circle cx="600" cy="360" r="86" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="600" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#14532d">Insight</text>
  <text x="600" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#166534">explain behavior</text>
  <path d="M710 360 H825" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <circle cx="920" cy="360" r="86" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <text x="920" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#78350f">Action</text>
  <text x="920" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#92400e">improve systems</text>
  <path d="M920 470 C800 560 400 560 280 470" fill="none" stroke="#6b7280" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#111827"/></marker></defs>
</svg>
