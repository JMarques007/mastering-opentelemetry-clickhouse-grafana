receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  debug:
    verbosity: basic

  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    username: otel
    password: otel
    database: otel
    async_insert: true
    ttl: 72h
    compress: lz4
    create_schema: true
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    metrics_tables:
      gauge:
        name: otel_metrics_gauge
      sum:
        name: otel_metrics_sum
      summary:
        name: otel_metrics_summary
      histogram:
        name: otel_metrics_histogram
      exponential_histogram:
        name: otel_metrics_exp_histogram
    sending_queue:
      enabled: true
      num_consumers: 2
      batch:
        # Lab-friendly so a single sample span is flushed quickly.
        # For production, tune this upward based on throughput and latency goals.
        min_size: 1
        flush_timeout: 2s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter]
      exporters: [clickhouse, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter]
      exporters: [clickhouse, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter]
      exporters: [clickhouse, debug]
