<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Module 13 - Best Practices</title>
  <desc id="desc">Illustration of reliability, cost, governance and signal quality practices.</desc>
  <rect width="1200" height="675" fill="#f7fafc"/>
  <rect x="70" y="70" width="1060" height="535" rx="24" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <text x="110" y="135" font-family="Arial" font-size="42" font-weight="700" fill="#111827">Best Practices</text>
  <text x="110" y="185" font-family="Arial" font-size="22" fill="#4b5563">Keeping observability useful, reliable and affordable</text>
  <circle cx="600" cy="375" r="145" fill="#eef2ff" stroke="#4f46e5" stroke-width="5"/>
  <text x="600" y="366" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#3730a3">Signal</text>
  <text x="600" y="403" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#3730a3">Quality</text>
  <rect x="165" y="260" width="220" height="88" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/><text x="275" y="314" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#14532d">Reliability</text>
  <rect x="815" y="260" width="220" height="88" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="4"/><text x="925" y="314" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#78350f">Cost</text>
  <rect x="165" y="455" width="220" height="88" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/><text x="275" y="509" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1e3a8a">Governance</text>
  <rect x="815" y="455" width="220" height="88" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/><text x="925" y="509" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#991b1b">Privacy</text>
