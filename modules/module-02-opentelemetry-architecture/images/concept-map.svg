<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><style>.t{font:700 44px Arial;fill:#06164f}.s{font:400 22px Arial;fill:#475569}.h{font:700 24px Arial;fill:#0b4bd8}.b{font:500 18px Arial;fill:#1e293b}.card{fill:#fff;stroke:#bfdbfe;stroke-width:3}.hub{fill:#0b63e5}.line{stroke:#2563eb;stroke-width:4;fill:none}</style></defs><rect width="1200" height="675" fill="url(#bg)"/><text x="70" y="80" class="t">OpenTelemetry Architecture</text><text x="70" y="118" class="s">Core building blocks and how telemetry moves through the system</text><circle cx="600" cy="350" r="95" class="hub"/><text x="600" y="342" text-anchor="middle" font="700 27px Arial" fill="#fff">OpenTelemetry</text><text x="600" y="378" text-anchor="middle" font="500 18px Arial" fill="#dbeafe">standard telemetry</text><g class="line"><path d="M505 350H330"/><path d="M695 350h175"/><path d="M600 255V170"/><path d="M600 445v90"/></g><g><rect x="120" y="295" width="210" height="110" rx="18" class="card"/><text x="225" y="342" text-anchor="middle" class="h">APIs</text><text x="225" y="372" text-anchor="middle" class="b">instrumentation surface</text><rect x="870" y="295" width="210" height="110" rx="18" class="card"/><text x="975" y="342" text-anchor="middle" class="h">Exporters</text><text x="975" y="372" text-anchor="middle" class="b">send telemetry</text><rect x="495" y="70" width="210" height="110" rx="18" class="card"/><text x="600" y="117" text-anchor="middle" class="h">SDKs</text><text x="600" y="147" text-anchor="middle" class="b">process signals</text><rect x="495" y="535" width="210" height="110" rx="18" class="card"/><text x="600" y="582" text-anchor="middle" class="h">Collector</text><text x="600" y="612" text-anchor="middle" class="b">receive process route</text></g></svg>