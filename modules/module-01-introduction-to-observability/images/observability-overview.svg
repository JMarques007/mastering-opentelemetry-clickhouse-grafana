<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Observability overview</title>
  <desc id="desc">Applications and services emit telemetry that helps teams observe, understand and improve production systems.</desc>
  <defs>
    <linearGradient id="bluePanel" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#0b4bd8"/><stop offset="1" stop-color="#06246f"/></linearGradient>
    <linearGradient id="softBlue" x1="0" x2="1"><stop stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="signal" x1="0" x2="1"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker>
    <style>
      .h1{font:700 42px Arial,sans-serif;fill:#06164f}.body{font:500 18px Arial,sans-serif;fill:#344267}.label{font:700 22px Arial,sans-serif;fill:#0b4bd8}.small{font:500 15px Arial,sans-serif;fill:#475569}.card{fill:#fff;stroke:#bfdbfe;stroke-width:2}.line{fill:none;stroke:#2563eb;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.dash{fill:none;stroke:#60a5fa;stroke-width:4;stroke-dasharray:7 9;stroke-linecap:round}
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f8fbff"/>
