<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675"><style>.t{font:700 44px Arial;fill:#06164f}.s{font:400 22px Arial;fill:#475569}.n{font:700 34px Arial;fill:#fff}.h{font:700 24px Arial;fill:#168a3a}.b{font:500 18px Arial;fill:#334155}.c{fill:#fff;stroke:#bbf7d0;stroke-width:3}</style><rect width="1200" height="675" fill="#f8fbff"/><text x="70" y="80" class="t">Metrics Lab Practice</text><text x="70" y="118" class="s">Build a useful measurement and avoid misleading cardinality</text><g transform="translate(100 220)"><rect width="220" height="250" rx="20" class="c"/><circle cx="55" cy="55" r="30" fill="#16a34a"/><text x="55" y="67" text-anchor="middle" class="n">1</text><text x="110" y="125" text-anchor="middle" class="h">Choose</text><text x="110" y="160" text-anchor="middle" class="b">counter or histogram</text></g><g transform="translate(365 220)"><rect width="220" height="250" rx="20" class="c"/><circle cx="55" cy="55" r="30" fill="#0b63e5"/><text x="55" y="67" text-anchor="middle" class="n">2</text><text x="110" y="125" text-anchor="middle" class="h">Label</text><text x="110" y="160" text-anchor="middle" class="b">safe dimensions</text></g><g transform="translate(630 220)"><rect width="220" height="250" rx="20" class="c"/><circle cx="55" cy="55" r="30" fill="#7c3aed"/><text x="55" y="67" text-anchor="middle" class="n">3</text><text x="110" y="125" text-anchor="middle" class="h">Query</text><text x="110" y="160" text-anchor="middle" class="b">rate and percentile</text></g><g transform="translate(895 220)"><rect width="220" height="250" rx="20" class="c"/><circle cx="55" cy="55" r="30" fill="#d97706"/><text x="55" y="67" text-anchor="middle" class="n">4</text><text x="110" y="125" text-anchor="middle" class="h">Validate</text><text x="110" y="160" text-anchor="middle" class="b">does it answer?</text></g></svg>