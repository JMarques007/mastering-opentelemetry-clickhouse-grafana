<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Module 08 - Instrumentation</title>
  <desc id="desc">Illustration of automatic and manual instrumentation producing telemetry.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="70" y="70" width="1060" height="535" rx="24" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <text x="110" y="135" font-family="Arial" font-size="42" font-weight="700" fill="#111827">Instrumentation</text>
  <text x="110" y="185" font-family="Arial" font-size="22" fill="#4b5563">Making applications emit useful telemetry at the right boundaries</text>
  <rect x="150" y="275" width="260" height="180" rx="18" fill="#111827"/>
  <text x="185" y="330" font-family="Consolas, monospace" font-size="22" fill="#bfdbfe">span.start()</text>
  <text x="185" y="375" font-family="Consolas, monospace" font-size="22" fill="#bbf7d0">counter.add(1)</text>
  <text x="185" y="420" font-family="Consolas, monospace" font-size="22" fill="#fde68a">logger.info()</text>
  <path d="M410 365 H530" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="530" y="275" width="210" height="180" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="635" y="350" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#1e3a8a">Telemetry</text>
  <text x="635" y="388" text-anchor="middle" font-family="Arial" font-size="18" fill="#1d4ed8">logs metrics traces</text>
  <path d="M740 365 H860" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="860" y="275" width="190" height="180" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="955" y="350" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#14532d">Insight</text>
  <text x="955" y="388" text-anchor="middle" font-family="Arial" font-size="18" fill="#166534">debug measure tune</text>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#111827"/></marker></defs>
</svg>
