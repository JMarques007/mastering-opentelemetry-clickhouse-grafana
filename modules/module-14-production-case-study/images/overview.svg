<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Module 14 - Production Case Study</title>
  <desc id="desc">Illustration of a production incident lifecycle from detection to learning.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="70" y="70" width="1060" height="535" rx="24" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <text x="110" y="135" font-family="Arial" font-size="42" font-weight="700" fill="#111827">Production Case Study</text>
  <text x="110" y="185" font-family="Arial" font-size="22" fill="#4b5563">Applying observability from incident detection to learning</text>
  <rect x="135" y="315" width="175" height="100" rx="15" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/><text x="222" y="375" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#991b1b">Detect</text>
  <path d="M310 365 H405" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="405" y="315" width="175" height="100" rx="15" fill="#fef3c7" stroke="#d97706" stroke-width="4"/><text x="492" y="375" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#78350f">Investigate</text>
  <path d="M580 365 H675" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="675" y="315" width="175" height="100" rx="15" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/><text x="762" y="375" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1e3a8a">Fix</text>
  <path d="M850 365 H945" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="945" y="315" width="175" height="100" rx="15" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/><text x="1032" y="375" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#14532d">Learn</text>
  <path d="M1032 430 C850 550 405 550 222 430" fill="none" stroke="#6b7280" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#111827"/></marker></defs>
</svg>
